name: Scraper ICC

permissions:
  contents: write

on:
  schedule:
    - cron: "30 13 15 * *" # 10:30 AR
    - cron: "30 13 16 * *" # 10:30 AR
    - cron: "30 13 17 * *" # 10:30 AR

  push:
    branches:
      - main
    paths:
      - "scrapers/scraper_construccion.py"

  workflow_dispatch:

jobs:
  construccion:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper Construccion
        run: |
          python scrapers/scraper_construccion.py

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/construccion
          # Solo hace commit si hay cambios reales para evitar fallos en el workflow
          git commit -m "chore: update Construccion (ICC)" || echo "No changes to commit"
          git pull --rebase origin main
          git push
